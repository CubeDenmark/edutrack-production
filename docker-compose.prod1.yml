services:

  app:
    build:
        context: .
        dockerfile: docker/php/Dockerfile
        target: app
    env_file:
      - .env.production
    expose:
      - "9000"
    depends_on:
      - mysql
    networks:
      - app-network

  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: edutrack
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql_data:
